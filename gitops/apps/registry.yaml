# User app registry — single source of truth for apps.applicationset.yaml
#
# IMPORTANT: when you add or remove an entry here, mirror the change in
# bootstrap/apps.applicationset.yaml (spec.generators[0].list.elements).
#
# Schema:
#   name        ArgoCD Application name (lowercase, dashes only)
#   namespace   Target namespace (created automatically)
#   syncWave    All user apps at wave 10 (after platform is ready)
#   repoURL     Per-app private git repo with values.yaml (SSH deploy key required)
#   valuesPath  Path to values file inside repoURL
#   hostname    Public hostname — passed as ingress.hostname to common-app-chart
#
# Per-app repo must have at minimum:
#   image.repository, image.tag, service.port

# n8n, openweb-ui(+pipelines), whodb, api, ukubi-ai are deferred — no
# working per-app repo yet (see docs/bootstrap-test-notes.md). Re-add once
# each has a real values.yaml; don't list a repo that doesn't exist, ArgoCD
# will just fail to clone it.

- name: searxng
  namespace: searxng
  syncWave: "10"
  repoURL: git@github.com:MohammadBnei/searxng.git
  valuesPath: values.yaml
  hostname: searxng.bnei.dev

- name: pgweb
  namespace: pgweb
  syncWave: "10"
  repoURL: git@github.com:MohammadBnei/pgweb.git
  valuesPath: values.yaml
  hostname: pgweb.bnei.dev
