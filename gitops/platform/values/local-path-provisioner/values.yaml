# local-path-provisioner Helm values for ukubi-cluster
# Chart: https://charts.containeroo.ch  name: local-path-provisioner
#
# No longer the default StorageClass — Longhorn took that role over
# (ADR-0002, gitops/platform/values/longhorn/values.yaml). Left
# installed, non-default, as a fallback: whether to remove it outright
# once Longhorn is verified healthy is still open (ADR-0019,
# docs/adr/0019-longhorn-rollout-specifics.md).
# hostPath-backed, per-node, not shared across nodes.

storageClass:
  create: true
  defaultClass: false
  name: local-path
  reclaimPolicy: Delete

nodePathMap:
  - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
    paths:
      - /opt/local-path-provisioner
