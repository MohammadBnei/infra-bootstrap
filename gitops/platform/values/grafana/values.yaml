# Grafana Helm values for ukubi-cluster
# Chart: https://grafana.github.io/helm-charts  name: grafana
#
# Migrated from k8s-cluster/grafana/values.yml — trim to essentials.

persistence:
  enabled: true
  size: 5Gi

# Admin credentials from K8s Secret (created via InfisicalSecret CR, see
# gitops/bootstrap/grafana-admin-secret.yaml)
admin:
  existingSecret: grafana-admin
  userKey: username
  passwordKey: password

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
      isDefault: true

# No IngressRoute wired up for Grafana yet (only argocd and infisical have
# one — see gitops/bootstrap/*-ingressroute.yaml). root_url below is set in
# anticipation of a future gitops/bootstrap/grafana-ingressroute.yaml
# (Traefik IngressRoute, ADR-0001 — not Gateway API/HTTPRoute).
grafana.ini:
  server:
    root_url: https://grafana.bnei.dev
