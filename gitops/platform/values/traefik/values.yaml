# Traefik Helm values for ukubi-cluster
# Chart: https://traefik.github.io/charts  name: traefik
#
# Key requirements (MISSION.md §5):
#   - Gateway named "external-ingress" (not "traefik")
#   - Listeners on port 80 (web) and 443 (websecure)
#   - ACME HTTP-01 cert resolver, acme.json on PVC (never emptyDir)
#   - MetalLB VIP: 192.168.1.230 (annotation or pool label)
#   - kube-proxy retained (cilium chaining mode — do NOT enable kube-proxy replacement)

service:
  type: LoadBalancer
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.1.230

ports:
  web:
    port: 80
  websecure:
    port: 443

gateway:
  enabled: true
  name: external-ingress
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy: All
    websecure:
      port: 443
      protocol: HTTPS
      namespacePolicy: All
      # TLS config — Traefik ACME manages the cert; certificateRefs not needed here
      mode: Terminate

providers:
  kubernetesGateway:
    enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: false

# ACME HTTP-01 — acme.json must be on a PVC, never emptyDir (MISSION.md §5)
persistence:
  enabled: true
  name: data
  accessMode: ReadWriteOnce
  size: 128Mi
  path: /data

# chart >=33.0.0 renamed this key from certResolvers and nested config under .acme
certificatesResolvers:
  le:
    acme:
      email: account@bnei.dev
      storage: /data/acme.json
      httpChallenge:
        entryPoint: web

# Dashboard via IngressRoute is disabled — expose via HTTPRoute if needed
ingressRoute:
  dashboard:
    enabled: false
