# Traefik Helm values for ukubi-cluster
# Chart: https://traefik.github.io/charts  name: traefik
#
# Key requirements (MISSION.md §5):
#   - Listeners on port 80 (web) and 443 (websecure)
#   - ACME HTTP-01 cert resolver, acme.json on PVC (never emptyDir)
#   - Per-app routing via Traefik IngressRoute, not Gateway API — Traefik's
#     ACME resolver can't issue certs for Gateway API listeners without
#     cert-manager as a Secret bridge (banned), so IngressRoute is the lock.
#   - MetalLB VIP: 192.168.1.230 (annotation or pool label)
#   - kube-proxy retained (cilium chaining mode — do NOT enable kube-proxy replacement)

service:
  type: LoadBalancer
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.1.230

ports:
  web:
    port: 80
  websecure:
    port: 443
    # Entrypoint-level ACME wiring — every IngressRoute router using this
    # entrypoint gets the "le" cert resolver automatically.
    tls:
      enabled: true
      certResolver: le

providers:
  kubernetesGateway:
    enabled: false
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: false

# ACME HTTP-01 — acme.json must be on a PVC, never emptyDir (MISSION.md §5)
persistence:
  enabled: true
  name: data
  accessMode: ReadWriteOnce
  size: 128Mi
  path: /data

# chart >=33.0.0 renamed this key from certResolvers and nested config under .acme
certificatesResolvers:
  le:
    acme:
      email: account@bnei.dev
      storage: /data/acme.json
      httpChallenge:
        entryPoint: web

# Dashboard via IngressRoute is disabled — expose via IngressRoute if needed
ingressRoute:
  dashboard:
    enabled: false
