{{- if .Values.infisical.enabled }}
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: {{ .Release.Name }}-infisical
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common-app-chart.labels" . | nindent 4 }}
spec:
  hostAPI: {{ .Values.infisical.hostAPI }}
  resyncInterval: {{ .Values.infisical.resyncInterval }}
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: {{ required "infisical.projectSlug is required when infisical.enabled is true" .Values.infisical.projectSlug | quote }}
        envSlug: {{ .Values.infisical.envSlug }}
        secretsPath: {{ .Values.infisical.secretsPath | quote }}
      credentialsRef:
        secretName: {{ .Values.infisical.credentialsRef.secretName }}
        secretNamespace: {{ .Values.infisical.credentialsRef.secretNamespace }}
  managedSecretReference:
    secretName: {{ include "common-app-chart.infisicalSecretName" . }}
    secretNamespace: {{ .Release.Namespace }}
    creationPolicy: Orphan
{{- end }}
