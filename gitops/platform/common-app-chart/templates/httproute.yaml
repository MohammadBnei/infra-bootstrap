{{- if and .Values.ingress.enabled .Values.ingress.hostname }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common-app-chart.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.ingress.gatewayName }}
    namespace: {{ .Values.ingress.gatewayNamespace }}
    sectionName: {{ .Values.ingress.listenerHTTPS }}
  hostnames:
  - {{ .Values.ingress.hostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Release.Name }}
      port: {{ .Values.service.port }}
{{- end }}
