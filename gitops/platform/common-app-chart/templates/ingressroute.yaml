{{- if and .Values.ingress.enabled .Values.ingress.hostname }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common-app-chart.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`{{ .Values.ingress.hostname }}`)
    services:
    - name: {{ .Release.Name }}
      port: {{ .Values.service.port }}
  tls:
    certResolver: {{ .Values.ingress.certResolver }}
{{- end }}
