replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

# Deployment metadata annotations. For pod-template annotations use
# podAnnotations below.
annotations: {}

service:
  port: 80
  annotations: {}

ingress:
  enabled: true
  hostname: ""
  # Traefik IngressRoute + native ACME (per ADR-0001,
  # docs/adr/0001-ingress-traefik-ingressroute-over-gateway-api.md) — Gateway API
  # can't get certs from Traefik's ACME resolver without cert-manager.
  certResolver: le
  annotations: {}
  # Traefik Middleware refs: [{name, namespace}]. Define the Middleware
  # itself via extraManifests below (e.g. BasicAuth for an admin-only app).
  middlewares: []

resources: {}
# requests:
#   cpu: 100m
#   memory: 128Mi
# limits:
#   memory: 256Mi

# Raw env vars: [{name, value}] or [{name, valueFrom: {secretKeyRef: {name, key}}}]
env: []

# Inject whole Secrets or ConfigMaps: [{secretRef: {name}}, {configMapRef: {name}}]
# When infisical.enabled is true, the chart appends a secretRef for the
# InfisicalSecret-managed Secret automatically — no need to list it here.
# Use this for anything *in addition* to that.
envFrom: []

# Infisical-backed secrets: renders an InfisicalSecret CR that syncs a
# project's secrets into a K8s Secret, auto-wired into envFrom above.
# Reuses the cluster's shared machine identity (universal-auth-credentials/
# infisical) — grant that identity access to your project in the Infisical
# UI, don't mint new K8s credentials per app.
infisical:
  enabled: false
  projectSlug: ""
  envSlug: dev
  secretsPath: "/"
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  resyncInterval: 60
  secretName: ""   # defaults to "<release-name>-infisical"
  credentialsRef:
    secretName: universal-auth-credentials
    secretNamespace: infisical

persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  mountPath: /data
  accessMode: ReadWriteOnce

livenessProbe:
  enabled: false
  type: http   # http | tcp
  path: /healthz
  port: ""     # defaults to service.port
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: false
  type: http
  path: /healthz
  port: ""
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Raw volume/volumeMount specs, toYaml'd as-is into the pod spec and the
# app container — escape hatch for anything the schema above doesn't cover
# (e.g. mounting a ConfigMap as files). Define the backing object itself
# via extraManifests below.
extraVolumes: []
extraVolumeMounts: []

# Raw extra K8s objects (ConfigMaps, a Middleware, a Secret, ...), each a
# YAML string rendered as its own document. `tpl`'d, so release/values
# templating works inside. Same idiom as Bitnami's `extraDeploy` — keeps
# common-app-chart generic instead of growing per-app special cases.
extraManifests: []
