replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 80

ingress:
  enabled: true
  hostname: ""
  # Traefik IngressRoute + native ACME (per ADR-0001,
  # docs/adr/0001-ingress-traefik-ingressroute-over-gateway-api.md) — Gateway API
  # can't get certs from Traefik's ACME resolver without cert-manager.
  certResolver: le

resources: {}
# requests:
#   cpu: 100m
#   memory: 128Mi
# limits:
#   memory: 256Mi

# Raw env vars: [{name, value}] or [{name, valueFrom: {secretKeyRef: {name, key}}}]
env: []

# Inject whole Secrets or ConfigMaps: [{secretRef: {name}}, {configMapRef: {name}}]
envFrom: []

persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  mountPath: /data
  accessMode: ReadWriteOnce

livenessProbe:
  enabled: false
  type: http   # http | tcp
  path: /healthz
  port: ""     # defaults to service.port
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: false
  type: http
  path: /healthz
  port: ""
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
