apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    # Pin to a specific version; bump here (not UI) for ArgoCD self-upgrades.
    # Helm chart 10.x == ArgoCD app 3.4.x. Bumped from 7.8.1/2.14.2 because
    # that version predates K8s 1.33's Deployment.status.terminatingReplicas
    # field, which broke structured-merge-diff for every app managing a
    # Deployment on this cluster's kube_version (1.35.4).
    targetRevision: "10.1.3"
    helm:
      values: |
        global:
          domain: argocd.bnei.dev

        configs:
          params:
            # TLS terminated at Traefik — ArgoCD serves plain HTTP inside the cluster
            "server.insecure": "true"
            # infra-bootstrap has a private k8s-cluster git submodule that repo-server
            # doesn't need (only plain files under gitops/ are referenced as values
            # sources) and has no credentials for. Skip submodule init entirely rather
            # than granting the deploy key access to a repo it doesn't use.
            "reposerver.enable.git.submodule": "false"
          cm:
            # Chart default list (kept intact) plus gateway.networking.k8s.io: Traefik's
            # chart bundles a Gateway API CRD set (bundle-version v1.2.1) in its crds/
            # directory. kubespray already installs newer Gateway API CRDs and a
            # ValidatingAdmissionPolicy (safe-upgrades.gateway.networking.k8s.io) rejects
            # ANY create/update of CRDs in this group below v1.5.0 — so even after
            # deleting the old CRDs, ArgoCD's own recreation attempt gets rejected.
            # We don't use Gateway API at all (IngressRoute is the lock, MISSION.md §5),
            # so just exclude this apiGroup from ArgoCD's sync scope entirely.
            "resource.exclusions": |
              ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
              - apiGroups:
                - ''
                - discovery.k8s.io
                kinds:
                - Endpoints
                - EndpointSlice
              ### Internal Kubernetes resources excluded reduce the number of watched events
              - apiGroups:
                - coordination.k8s.io
                kinds:
                - Lease
              ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
              - apiGroups:
                - authentication.k8s.io
                - authorization.k8s.io
                kinds:
                - SelfSubjectReview
                - TokenReview
                - LocalSubjectAccessReview
                - SelfSubjectAccessReview
                - SelfSubjectRulesReview
                - SubjectAccessReview
              ### Intermediate Certificate Request excluded reduce the number of watched events
              - apiGroups:
                - certificates.k8s.io
                kinds:
                - CertificateSigningRequest
              - apiGroups:
                - cert-manager.io
                kinds:
                - CertificateRequest
              ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
              - apiGroups:
                - cilium.io
                kinds:
                - CiliumIdentity
                - CiliumEndpoint
                - CiliumEndpointSlice
              ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
              - apiGroups:
                - kyverno.io
                - reports.kyverno.io
                - wgpolicyk8s.io
                kinds:
                - PolicyReport
                - ClusterPolicyReport
                - EphemeralReport
                - ClusterEphemeralReport
                - AdmissionReport
                - ClusterAdmissionReport
                - BackgroundScanReport
                - ClusterBackgroundScanReport
                - UpdateRequest
              ### Gateway API — not used (IngressRoute is the routing lock, MISSION.md §5);
              ### Traefik's chart bundles an outdated CRD set that a cluster-wide
              ### ValidatingAdmissionPolicy rejects. Never let ArgoCD try to manage this group.
              - apiGroups:
                - gateway.networking.k8s.io
                kinds:
                - '*'

        server:
          service:
            type: ClusterIP
          # Disable built-in Ingress — we use a Gateway API HTTPRoute (argocd-httproute.yaml)
          ingress:
            enabled: false
          ingressGrpc:
            enabled: false

        applicationSet:
          enabled: true

        notifications:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
