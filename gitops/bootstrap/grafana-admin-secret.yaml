# InfisicalSecret that materialises the k8s cluster's Grafana admin
# credentials. Applied at bootstrap time but only becomes active once
# Infisical (wave 1) and infisical-operator (wave 1) are running.
#
# Required secret in the infra-bootstrap Infisical project (see docs/secrets.md):
#   K8S_GRAFANA_ADMIN_PASSWORD — NOT the same as GRAFANA_ADMIN_PASSWORD,
#   which is Pigsty's separate, unrelated Grafana instance.
#
# Consumed by gitops/platform/values/grafana/values.yaml's
# admin.existingSecret: grafana-admin (userKey/passwordKey already set there).
#
# This CR lives in ns infisical (not monitoring) because monitoring doesn't
# exist yet at bootstrap Step 3 time — it's only created later when the
# Grafana Application (wave 5, CreateNamespace=true) first syncs. The
# managedSecretReference below targets monitoring directly; the operator
# retries (resyncInterval) until that namespace exists.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: grafana-admin-secret
  namespace: infisical
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: "infra-bootstrap-1-ge1"
        envSlug: dev
        secretsPath: "/"
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical
  managedSecretReference:
    secretName: grafana-admin
    secretNamespace: monitoring
    creationPolicy: Orphan
    template:
      data:
        username: "admin"
        password: "{{ .K8S_GRAFANA_ADMIN_PASSWORD }}"
