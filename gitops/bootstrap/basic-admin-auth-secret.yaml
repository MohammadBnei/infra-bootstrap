# InfisicalSecret that materialises the shared basic-admin-auth credential
# (see basic-admin-auth-middleware.yaml). Applied at bootstrap time but
# only becomes active once Infisical + infisical-operator (wave 1) are up.
#
# Required secret in the infra-bootstrap Infisical project (see docs/secrets.md):
#   BASIC_AUTH_HTPASSWD — an htpasswd line ("user:apr1-hash"), reusing the
#   real credential already live in k8s-cluster/traefik/middlewares/basicauth.yml
#   rather than rotating it during migration.
#
# `default` namespace always exists, unlike grafana-admin-secret.yaml's
# target (which relies on operator retry until `monitoring` is created).
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: basic-admin-auth-secret
  namespace: infisical
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: "infra-bootstrap-1-ge1"
        envSlug: dev
        secretsPath: "/"
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical
  managedSecretReference:
    secretName: authsecret
    secretNamespace: default
    creationPolicy: Orphan
    template:
      data:
        users: "{{ .BASIC_AUTH_HTPASSWD }}"
