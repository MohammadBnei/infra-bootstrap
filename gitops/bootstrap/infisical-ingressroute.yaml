apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infisical
  namespace: infisical
spec:
  parentRefs:
  - name: external-ingress
    namespace: traefik
    sectionName: websecure
  hostnames:
  - infisical.bnei.dev
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: infisical
      port: 8080
