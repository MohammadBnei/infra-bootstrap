apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
  - list:
      # Keep in sync with gitops/apps/registry.yaml (human source of truth).
      # Add an app: update registry.yaml first, then mirror the entry here.
      elements:

      # n8n, openweb-ui(+pipelines), whodb, api, ukubi-ai are deferred —
      # no working per-app repo yet (see docs/bootstrap-test-notes.md).
      # Re-add once each has a real values.yaml.
      #
      # searxng/pgweb are NOT here — public-image, no app-specific code,
      # driven as platform apps instead (see platform-common-apps.applicationset.yaml).
      # This ApplicationSet is intentionally empty until a real user-app
      # repo exists.

  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{.syncWave}}'
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
      # Source 1: shared Helm chart from infra-bootstrap
      - repoURL: git@github.com:MohammadBnei/infra-bootstrap.git
        path: gitops/platform/common-app-chart
        targetRevision: HEAD
        helm:
          valueFiles:
          - $values/{{.valuesPath}}
          parameters:
          - name: ingress.hostname
            value: '{{.hostname}}'
      # Source 2: per-app values repo (private, SSH deploy key required)
      - repoURL: '{{.repoURL}}'
        targetRevision: HEAD
        ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      # Infisical operator writes to InfisicalSecret's .status on every
      # resync (spec.infisical.resyncInterval in common-app-chart) — without
      # this, ArgoCD flags the resource (and the whole Application) as
      # perpetually OutOfSync even when nothing changed. Static rule, safe
      # for apps that don't set infisical.enabled (the CR just won't exist).
      ignoreDifferences:
      - group: secrets.infisical.com
        kind: InfisicalSecret
        jsonPointers:
        - /status
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
