---
# Addons for `proxmox-gpu` (test cluster).
#
# The split is locked (see homelab-infra-workflow): kubespray owns
# cluster-bootstrap addons (MetalLB, cert-manager, Gateway API CRDs);
# ArgoCD owns everything else (Traefik, NVIDIA device plugin, app
# workloads). Flipping an addon in this list without a matching flip in
# the ArgoCD App-of-Apps creates a two-managers fight.

# --- ON: kubespray-managed ---------------------------------------------------
gateway_api_enabled: true                    # CRDs only — Traefik / apps reference them later

cert_manager_enabled: true
cert_manager_namespace: cert-manager
cert_manager_dns_policy: ClusterFirst
cert_manager_dns_config:
  nameservers:
    - 1.1.1.1
    - 8.8.8.8

metallb_enabled: true
metallb_speaker_enabled: true
metallb_namespace: metallb-system
metallb_protocol: layer2
# IP range is well clear of the static node IPs (.201-.203) and the
# reserved API VIP (.180). Sharing the L2 broadcast domain with those
# would let a random LoadBalancer Service steal the apiserver.
metallb_config:
  speaker:
    # Tolerate the control-plane taint so the speaker runs on k8s-cp-01
    # (single-CP cluster — no dedicated workers yet).
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Equal
        effect: NoSchedule
  controller:
    replicas: 2
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Equal
        effect: NoSchedule
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values: [metallb]
                - key: component
                  operator: In
                  values: [controller]
            topologyKey: kubernetes.io/hostname
  address_pools:
    primary:
      ip_range:
        - 192.168.1.230-192.168.1.250
      auto_assign: true
  layer2:
    - primary

krew_enabled: true
krew_root_dir: /usr/local/krew

# --- OFF: ArgoCD-managed (deployed later via k8s-cluster repo) ---------------
argocd_enabled: false
ingress_nginx_enabled: false
helm_enabled: false
dashboard_enabled: false
metrics_server_enabled: false
local_path_provisioner_enabled: false
nvidia_accelerator_enabled: false              # also disabled in k8s-cluster.yml
kube_vip_enabled: false
node_feature_discovery_enabled: false
