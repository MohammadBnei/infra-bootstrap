---
helm_enabled: false

# Disabled: GitOps (platform ApplicationSet) is the single source of truth
# for metrics-server. Having kubespray also install it caused both to fight
# over the metrics.k8s.io APIService and crash-loop.
metrics_server_enabled: false

gateway_api_enabled: true

# ArgoCD installed via helm + kubectl apply -f bootstrap/ — NOT via kubespray (MISSION §7)
argocd_enabled: false

# Traefik ACME (HTTP-01) is the cert engine — cert-manager is forbidden (MISSION §5, §13)
cert_manager_enabled: false
cert_manager_namespace: "cert-manager"

# MetalLB L2 mode — 192.168.1.230-250 reserved, .230 is Traefik ingress VIP (MISSION §6)
metallb_enabled: true
metallb_speaker_enabled: "{{ metallb_enabled }}"
metallb_namespace: "metallb-system"
metallb_protocol: "layer2"
metallb_config:
  speaker:
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Equal"
        effect: "NoSchedule"
  controller:
    replicas: 2
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Equal"
        effect: "NoSchedule"
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - metallb
                - key: component
                  operator: In
                  values:
                    - controller
            topologyKey: kubernetes.io/hostname
  address_pools:
    primary:
      ip_range:
        - 192.168.1.230-192.168.1.250
      auto_assign: true
  layer2:
    - primary

krew_enabled: true
krew_root_dir: "/usr/local/krew"
