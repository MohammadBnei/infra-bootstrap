---
# Kubernetes core configuration for `ukubi` (new build on proxmox PVE).
# Patterned after inventory/mycluster/group_vars/k8s_cluster/k8s-cluster.yml
# and the homelab-infra-workflow locked choices.

# --- Kubernetes version ------------------------------------------------------
# Pinned to the libvirt ukubi-cluster's apiserver (1.35.4) so kubelet joins
# don't drift across minor versions during the migration. The pinned
# kubespray v2.23 submodule has 1.33/1.34/1.35 entries in
# roles/kubespray_defaults/vars/main/checksums.yml — 1.35.4 is in range.
kube_version: 1.35.4

# --- Network plugin ----------------------------------------------------------
# Cilium in chaining mode with kube-proxy retained. server1 is still
# libvirt (no eBPF hardware); kube-proxy-replacement would break on it.
# Cilium still does BPF policy + Hubble observability; kube-proxy does
# the service-IP → pod routing. See k8s-net-cilium.yml for the
# Cilium-specific deltas.
kube_network_plugin: cilium
kube_proxy_mode: ipvs                       # matches the homelab pattern (libvirt cluster)
kube_proxy_strict_arp: true                 # required for MetalLB L2 to answer ARPs correctly

# --- etcd --------------------------------------------------------------------
# Single etcd member stacked on the only control plane (k8s-cp-01).
# `kubeadm` deployment type uses a static pod managed by kubelet — matches
# the libvirt cluster's pattern and keeps the door open for adding a
# second etcd member later by re-running `cluster.yml` (not `scale.yml`).
etcd_deployment_type: kubeadm

# --- API server endpoint -----------------------------------------------------
# Greenfield single-CP, so point the LB at k8s-cp-01 itself. No localhost
# nginx LB is needed (would conflict with apiserver on port 6443 when every
# node is a control plane / worker with no dedicated workers to host it).
loadbalancer_apiserver:
  address: 192.168.1.201
  port: 6443
loadbalancer_apiserver_localhost: false

# Distinct from the libvirt cluster's `k8s.bnei.lan`. Pi-hole resolves this
# internally; bnei.dev is the public wildcard zone.
apiserver_loadbalancer_domain_name: k8s-proxmox-gpu.bnei.lan

# --- TLS SANs ----------------------------------------------------------------
# Includes every node IP the apiserver will be reached at, plus the
# internal and external DNS names. The reserved API VIP (.180) and the
# legacy libvirt IPs (.181, .191) are intentionally excluded — the new
# cert is separate from the libvirt one. If this build is later promoted
# to the production target, add .180 to this list BEFORE re-running
# cluster.yml (cert rotation is more work than getting the SANs right
# the first time).
supplementary_addresses_in_ssl_keys:
  - 192.168.1.201
  - 192.168.1.202
  - 192.168.1.203
  - k8s-proxmox-gpu.bnei.lan
  - k8s-proxmox-gpu.bnei.dev

# --- GPU ---------------------------------------------------------------------
# kubespray's NVIDIA driver-install DaemonSet is skipped: the host on
# k8s-worker-gpu already has the driver installed, and the DaemonSet
# re-runs on every cluster.yml, risking a re-install race. The device
# plugin itself (the DaemonSet that exposes `nvidia.com/gpu` capacity) is
# deployed by ArgoCD/Helm post-join — see README.md "Post-join follow-ups".
nvidia_accelerator_enabled: false
