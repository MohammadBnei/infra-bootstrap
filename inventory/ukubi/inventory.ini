# ukubi-cluster kubespray inventory
# IPs are TBD — assigned at implementation time per infrastructure-desired.md
# Run: see ../README.md

[kube_control_plane]
# k8s-cp-01  ansible_host=<TBD>

[etcd]
# k8s-cp-01  ansible_host=<TBD>
# NOTE: Postgres replication is separate from kubespray etcd; there is no Pi 4 witness node

[kube_node]
# k8s-cp-01        ansible_host=<TBD>
# k8s-worker-gpu   ansible_host=<TBD>
# k8s-worker-01    ansible_host=<TBD>

[all:vars]
ansible_user=core
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3

# Cluster
cluster_name=ukubi-cluster
kube_version=1.35.4
kube_network_plugin=cilium

# CNI: cilium in chaining mode (not kube-proxy replacement)
# because not all PVE hosts have eBPF hardware support
cilium_chaining_mode=portmap
kube_proxy_replace=disabled

# Container runtime
container_manager=containerd

# Addons we use
dashboard_enabled=false
metrics_server_enabled=true
ingress_controller=traefik
